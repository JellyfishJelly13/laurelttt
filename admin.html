<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laurel's Treadmill Tracker</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/44jajt6dm/44ppupxpf/Clipboard%20May%2018,%202026%20at%2010.10%E2%80%AFPM.png">

  <!-- Patrick Hand Font -->
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #111111;
      --card-border: #333333;
      --green: #16a34a;
      --red: #dc2626;
      --blue: #2563eb;
      --orange: #d97706;
      --gray: #4b5563;
      --text-main: #ffffff;
      --text-muted: #a3a3a3;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      font-family: 'Patrick Hand', cursive; 
    }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 16px;
    }

    /* LOADING SCREEN */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.35s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 70px;
      height: 70px;
      border: 6px solid #222;
      border-top: 6px solid #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    .loading-text {
      font-size: 34px;
      color: #fff;
      text-align: center;
    }

    .loading-subtext {
      margin-top: 8px;
      font-size: 20px;
      color: var(--text-muted);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Black Theme Card */
    .card {
      width: min(500px, 92vw);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      position: relative;
      z-index: 10;
    }

    h1 {
      font-size: 38px;
      margin-bottom: 20px;
      color: #fff;
    }

    /* Stopwatch */
    .stopwatch {
      font-size: clamp(55px, 12vw, 80px);
      margin: 15px 0;
      color: #fff;
    }

    /* Progress Bar */
    .progress-wrapper {
      margin: 25px 0 15px;
    }

    .progress-bg {
      height: 18px;
      width: 100%;
      background: #222;
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid #333;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      border-radius: 99px;
      transition: width 0.3s ease-out;
    }

    .status-text {
      color: var(--text-muted);
      font-size: 24px;
      margin-bottom: 2px;
    }

    .eta-text {
      font-size: 20px;
      margin-bottom: 25px;
    }

    /* Buttons */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 20px;
      border-radius: 14px;
      border: none;
      font-size: 22px;
      color: white;
      cursor: pointer;
      transition: transform 0.1s, filter 0.2s;
    }

    button:active { transform: scale(0.95); }
    button:hover { filter: brightness(1.1); }

    .btn-main { background: var(--green); flex-grow: 1; font-size: 26px; }
    .btn-main.stop { background: var(--red); }
    .btn-goal { background: var(--blue); }

    /* Latency Text Link */
    .latency-link {
      margin-top: 15px;
      font-size: 18px;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
      display: inline-block;
    }
    
    .latency-link:hover { color: #fff; }
    
    /* Goal Reached Controls Container */
    .goal-controls {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
      width: 100%;
    }

    .btn-add { background: var(--orange); width: 100%; }
    .btn-done { background: var(--gray); width: 100%; }

    /* Modal / Popup */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .modal {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      border: 1px solid #333;
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    .modal h3 { margin-bottom: 15px; font-size: 30px; color: #fff; }
    
    .modal-subtitle {
      color: var(--text-muted);
      font-size: 18px;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .modal button { width: 100%; margin-bottom: 10px; background: #222; border: 1px solid #444; }
    
    .custom-input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      margin-top: 10px;
    }
    
    .custom-input-group input {
      flex-grow: 1;
      width: 50%;
      background: #000;
      border: 1px solid #444;
      color: #fff;
      border-radius: 12px;
      padding: 10px;
      font-size: 20px;
      text-align: center;
      outline: none;
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    .custom-input-group button {
      width: auto;
      margin: 0;
      background: var(--green);
      border: none;
      padding: 10px 15px;
    }

    .modal .btn-close {
      background: var(--red);
      margin-top: 15px;
      border: none;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>

<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading...</div>
  <div class="loading-subtext">Contacting server...</div>
</div>

<canvas id="fx"></canvas>

<div class="card">
  <h1>Laurel's Treadmill Tracker</h1>

  <div class="stopwatch" id="time">00:00:00</div>

  <div class="progress-wrapper">
    <div class="progress-bg">
      <div class="progress-bar" id="bar"></div>
    </div>
  </div>

  <div class="status-text" id="goalText">Connecting...</div>
  <div class="eta-text" id="etaText"></div>

  <div class="controls">
    <button class="btn-goal" onclick="openMenu('goalOverlay', 'goalModal')">Set Goal</button>
    <button id="mainBtn" class="btn-main" onclick="toggleStart()">START</button>
  </div>
  
  <div class="latency-link" id="latencyBtnText" onclick="openMenu('latencyOverlay', 'latencyModal')">Sync Interval</div>
  
  <div class="goal-controls" id="goalControls">
    <button class="btn-add" onclick="addFive()">+5 Minutes</button>
    <button class="btn-done" onclick="finishWorkout()">Done</button>
  </div>
</div>

<!-- GOAL MENU -->
<div class="modal-overlay" id="goalOverlay">
  <div class="modal" id="goalModal">
    <h3>Set Daily Goal</h3>
    <button onclick="setGoal(30)">30 Minutes</button>
    <button onclick="setGoal(45)">45 Minutes</button>
    <button onclick="setGoal(60)">60 Minutes</button>
    
    <div class="custom-input-group">
      <input type="number" id="customGoalHours" placeholder="Hrs" min="0">
      <input type="number" id="customGoalMins" placeholder="Mins" min="0">
      <button onclick="setCustomGoal()">Set</button>
    </div>

    <button class="btn-close" onclick="closeMenu('goalOverlay', 'goalModal')">Cancel</button>
  </div>
</div>

<!-- LATENCY MENU -->
<div class="modal-overlay" id="latencyOverlay">
  <div class="modal" id="latencyModal">
    <h3>Sync Interval</h3>
    <div class="modal-subtitle">
      Lower intervals updates faster on other screens, but uses more database network bandwidth.
    </div>
    
    <button onclick="changeLatency(1000)">Low (1000ms)</button>
    <button onclick="changeLatency(2500)">Medium (2500ms)</button>
    <button onclick="changeLatency(5000)">High (5000ms)</button>
    
    <div class="custom-input-group">
      <input type="number" id="customLatencyInput" placeholder="Custom ms" min="500">
      <button onclick="setCustomLatency()">Set</button>
    </div>

    <button class="btn-close" onclick="closeMenu('latencyOverlay', 'latencyModal')">Cancel</button>
  </div>
</div>

<script>
// --- SETTINGS ---
const firebaseURL = "https://laurel-s-treadmill-workout-default-rtdb.firebaseio.com/treadmill.json";
const CELEBRATION_DURATION = 5000;

let state = {
  total: 0,
  running: false,
  startTime: null,
  goal: 3600000
};

let hasCelebrated = false;
let syncLatency = 5000;
let syncInterval = null;

// --- LOADING SCREEN ---
function hideLoadingScreen() {
  const loading = document.getElementById("loadingScreen");
  loading.classList.add("hidden");

  setTimeout(() => {
    loading.style.display = "none";
  }, 350);
}

// --- CANVAS CONFETTI ---
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const colors = ["#22c55e", "#3b82f6", "#ec4899", "#eab308", "#ffffff"];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = -10;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = (Math.random() * 3) + 2;
    this.size = Math.random() * 6 + 4;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.tilt = Math.floor(Math.random() * 10) - 10;
    this.tiltAngle = 0;
    this.tiltAngleInc = (Math.random() * 0.07) + 0.05;
  }

  update() {
    this.tiltAngle += this.tiltAngleInc;
    this.y += this.vy;
    this.x += Math.sin(this.tiltAngle) * 2;
    this.tilt = Math.sin(this.tiltAngle) * 15;
  }

  draw() {
    ctx.beginPath();
    ctx.lineWidth = this.size;
    ctx.strokeStyle = this.color;
    ctx.moveTo(this.x + this.tilt + this.size, this.y);
    ctx.lineTo(this.x + this.tilt, this.y + this.tilt + this.size);
    ctx.stroke();
  }
}

function celebrate() {
  if (hasCelebrated) return;

  hasCelebrated = true;
  let end = Date.now() + CELEBRATION_DURATION;
  
  (function frame() {
    if (Date.now() < end && particles.length < 150) {
      particles.push(new Particle(), new Particle());
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
      p.update();
      p.draw();

      if (p.y > canvas.height) particles.splice(index, 1);
    });

    if (particles.length > 0) requestAnimationFrame(frame);
  }());
}

// --- FIREBASE LOGIC ---
async function loadData() {
  try {
    let r = await fetch(firebaseURL + "?_t=" + Date.now());
    let d = await r.json();
    
    if (d) {
      state.total = d.total || 0;
      state.running = d.running || false;
      state.startTime = d.startTime || null;
      state.goal = d.goal || state.goal;
    } else {
      state.total = 0;
      state.running = false;
      state.startTime = null;
      state.goal = 3600000;
    }
  } catch(e) {
    console.error("Firebase load failed.");
  }
}

async function saveData() {
  try {
    await fetch(firebaseURL, {
      method: "PUT",
      body: JSON.stringify(state)
    });
  } catch(e) {
    console.error("Firebase save failed.");
  }
}

function startPolling() {
  if (syncInterval) clearInterval(syncInterval);
  syncInterval = setInterval(loadData, syncLatency);
}

// --- TIMER LOGIC ---
function formatTime(ms) {
  let s = Math.floor(ms / 1000);
  let h = Math.floor(s / 3600);
  let m = Math.floor((s % 3600) / 60);
  let sec = s % 60;

  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

function updateUI() {
  let liveTime = state.total;

  if (state.running && state.startTime) {
    liveTime += Date.now() - state.startTime;
  }

  document.getElementById("time").innerText = formatTime(liveTime);

  let percent = Math.min((liveTime / state.goal) * 100, 100);
  document.getElementById("bar").style.width = percent + "%";

  let left = Math.max(state.goal - liveTime, 0);

  const goalText = document.getElementById("goalText");
  const etaText = document.getElementById("etaText");
  const goalControls = document.getElementById("goalControls");

  if (left > 0) {
    goalText.innerText = `${Math.ceil(left / 60000)} min left`;
    
    if (state.running) {
      let finishDate = new Date(Date.now() + left);

      let timeString = finishDate.toLocaleTimeString([], {
        hour: 'numeric',
        minute: '2-digit'
      });

      etaText.innerText = `Estimated finish: ${timeString}`;
      etaText.style.color = "var(--green)";
    } else if (state.total > 0) {
      etaText.innerText = "Paused";
      etaText.style.color = "var(--orange)";
    } else {
      etaText.innerText = "";
    }

    goalControls.style.display = "none";
    hasCelebrated = false;
  } else {
    goalText.innerText = "Goal Reached!";
    etaText.innerText = "";
    goalControls.style.display = "flex";

    if (!hasCelebrated) celebrate();
  }

  const btn = document.getElementById("mainBtn");

  if (state.running) {
    btn.innerText = "STOP";
    btn.classList.add("stop");
  } else {
    btn.innerText = "START";
    btn.classList.remove("stop");
  }
}

// --- CONTROLS ---
async function toggleStart() {
  if (!state.running) {
    state.startTime = Date.now();
    state.running = true;
  } else {
    state.total += Date.now() - state.startTime;
    state.running = false;
    state.startTime = null;
  }

  updateUI();
  await saveData(); 
}

async function setGoal(mins) {
  state.goal = mins * 60000;

  closeMenu('goalOverlay', 'goalModal');

  updateUI();
  await saveData(); 
}

async function setCustomGoal() {
  let hrs = parseInt(document.getElementById("customGoalHours").value) || 0;
  let mins = parseInt(document.getElementById("customGoalMins").value) || 0;
  
  let totalMins = (hrs * 60) + mins;

  if (totalMins > 0) {
    state.goal = totalMins * 60000;
    
    document.getElementById("customGoalHours").value = "";
    document.getElementById("customGoalMins").value = "";
    
    closeMenu('goalOverlay', 'goalModal');

    updateUI();
    await saveData(); 
  }
}

async function addFive() {
  state.goal += 5 * 60000;

  updateUI();
  await saveData(); 
}

async function finishWorkout() {
  state = {
    total: 0,
    running: false,
    startTime: null,
    goal: 3600000 
  };

  hasCelebrated = false;

  await saveData();
  window.location.reload();
}

// --- LATENCY CONTROLS ---
function changeLatency(ms) {
  syncLatency = ms;
  
  let label = "Custom";

  if (ms === 1000) label = "Low";
  if (ms === 2500) label = "Medium";
  if (ms === 5000) label = "High";

  document.getElementById("latencyBtnText").innerText = `Latency`;
  
  startPolling();
  closeMenu('latencyOverlay', 'latencyModal');
}

function setCustomLatency() {
  let val = parseInt(document.getElementById("customLatencyInput").value);

  if (val && val >= 500) {
    changeLatency(val);
    document.getElementById("customLatencyInput").value = "";
  }
}

// --- MODAL MENU LOGIC ---
function openMenu(overlayId, modalId) {
  const overlay = document.getElementById(overlayId);
  const modal = document.getElementById(modalId);

  overlay.style.display = "flex";

  setTimeout(() => {
    overlay.style.opacity = "1";
    modal.style.transform = "translateY(0)";
  }, 10);
}

function closeMenu(overlayId, modalId) {
  const overlay = document.getElementById(overlayId);
  const modal = document.getElementById(modalId);

  overlay.style.opacity = "0";
  modal.style.transform = "translateY(20px)";

  setTimeout(() => {
    overlay.style.display = "none";
  }, 300);
}

// --- INITIALIZATION ---
async function init() {
  await loadData();

  updateUI();

  setTimeout(() => {
    hideLoadingScreen();
  }, 2000);
  
  setInterval(updateUI, 33);

  startPolling();
}

init();
</script>

</body>
</html>
