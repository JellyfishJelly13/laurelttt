<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laurel's Treadmill Tracker</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://uploads.onecompiler.io/44jajt6dm/44ppupxpf/Clipboard%20May%2018,%202026%20at%2010.10%E2%80%AFPM.png">

  <!-- Patrick Hand Font -->
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #111111;
      --card-border: #333333;
      --green: #16a34a;
      --text-main: #ffffff;
      --text-muted: #a3a3a3;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      /* Force Patrick Hand on EVERYTHING */
      font-family: 'Patrick Hand', cursive; 
    }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 16px;
    }

    /* Black Theme Card */
    .card {
      width: min(500px, 92vw);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 35px 25px 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      position: relative;
      z-index: 10;
    }

    h1 {
      font-size: 38px;
      margin-bottom: 20px;
      color: #fff;
    }

    /* Stopwatch */
    .stopwatch {
      font-size: clamp(55px, 12vw, 80px);
      margin: 15px 0;
      color: #fff;
    }

    /* Progress Bar */
    .progress-wrapper {
      margin: 25px 0 15px;
    }

    .progress-bg {
      height: 18px;
      width: 100%;
      background: #222;
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid #333;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      border-radius: 99px;
      transition: width 0.3s ease-out;
    }

    .status-text {
      color: var(--text-muted);
      font-size: 22px;
      margin-bottom: 5px;
    }

    /* Canvas for Confetti */
    canvas {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>

<body>

<canvas id="fx"></canvas>

<div class="card">
  <h1>Laurel's Treadmill Tracker</h1>

  <div class="stopwatch" id="time">00:00:00</div>

  <div class="progress-wrapper">
    <div class="progress-bg">
      <div class="progress-bar" id="bar"></div>
    </div>
  </div>

  <div class="status-text" id="goalText">Connecting...</div>
</div>

<script>
// --- SETTINGS ---
const firebaseURL = "https://laurel-s-treadmill-workout-default-rtdb.firebaseio.com/treadmill.json";
const CELEBRATION_DURATION = 5000;

let state = {
  total: 0,
  running: false,
  startTime: null,
  goal: 3600000 // 60 mins default
};

let hasCelebrated = false;

// --- CANVAS CONFETTI ---
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const colors = ["#22c55e", "#3b82f6", "#ec4899", "#eab308", "#ffffff"];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = -10;
    this.vx = (Math.random() - 0.5) * 5;
    this.vy = (Math.random() * 3) + 2;
    this.size = Math.random() * 6 + 4;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.tilt = Math.floor(Math.random() * 10) - 10;
    this.tiltAngle = 0;
    this.tiltAngleInc = (Math.random() * 0.07) + 0.05;
  }
  update() {
    this.tiltAngle += this.tiltAngleInc;
    this.y += this.vy;
    this.x += Math.sin(this.tiltAngle) * 2;
    this.tilt = Math.sin(this.tiltAngle) * 15;
  }
  draw() {
    ctx.beginPath();
    ctx.lineWidth = this.size;
    ctx.strokeStyle = this.color;
    ctx.moveTo(this.x + this.tilt + this.size, this.y);
    ctx.lineTo(this.x + this.tilt, this.y + this.tilt + this.size);
    ctx.stroke();
  }
}

function celebrate() {
  if (hasCelebrated) return;
  hasCelebrated = true;
  let end = Date.now() + CELEBRATION_DURATION;
  
  (function frame() {
    if (Date.now() < end && particles.length < 150) {
      particles.push(new Particle(), new Particle());
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, index) => {
      p.update();
      p.draw();
      if (p.y > canvas.height) particles.splice(index, 1);
    });
    if (particles.length > 0) requestAnimationFrame(frame);
  }());
}

// --- FIREBASE LOGIC ---
async function loadData() {
  try {
    let r = await fetch(firebaseURL);
    let d = await r.json();
    if (d) {
      state.total = d.total || 0;
      state.running = d.running || false;
      state.startTime = d.startTime || null;
      state.goal = d.goal || state.goal;
    }
  } catch (e) {
    console.error("Firebase connection error.");
  }
}

// --- TIMER LOGIC ---
function formatTime(ms) {
  let s = Math.floor(ms / 1000);
  let h = Math.floor(s / 3600);
  let m = Math.floor((s % 3600) / 60);
  let sec = s % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

// --- UI UPDATER ---
function updateUI() {
  let liveTime = state.total;
  if (state.running && state.startTime) {
    liveTime += Date.now() - state.startTime;
  }

  // Time
  document.getElementById("time").innerText = formatTime(liveTime);

  // Progress Bar
  let percent = Math.min((liveTime / state.goal) * 100, 100);
  document.getElementById("bar").style.width = percent + "%";

  // Goal Text
  let left = Math.max(state.goal - liveTime, 0);
  if (left > 0) {
    document.getElementById("goalText").innerText = `${Math.ceil(left / 60000)} min left`;
  } else {
    document.getElementById("goalText").innerText = "Goal Reached!";
    if (!hasCelebrated) celebrate();
  }
  
  if (liveTime < state.goal) hasCelebrated = false;
}

// --- INITIALIZATION ---
async function init() {
  await loadData(); // Initial load
  
  // Update the UI smoothly 30 times a second locally
  setInterval(updateUI, 33);
  
  // Quietly ping Firebase every 5 seconds to stay in sync with the controller
  setInterval(loadData, 5000); 
}

init();
</script>

</body>
</html>
